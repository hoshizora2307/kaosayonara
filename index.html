<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Farewell, My Love - KAO | Legacy of DAICHI</title>
    <style>
        :root {
            --primary-pink: #ffb6c1;
            --deep-pink: #ff69b4;
            --dark-pink: #c71585;
            --flash-blue: #00ffff;
            --bg-color: #0d0d0d; /* より深い黒 */
            --text-color: #fff;
            --vh: 1vh;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: calc(var(--vh) * 100);
            background-color: var(--bg-color);
            font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            color: var(--text-color);
            overflow: hidden;
            position: relative;
        }

        /* --- Opening & Loading Screen (FLASH Style) --- */
        #opening {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000;
            padding: 20px;
            box-sizing: border-box;
            transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1), opacity 0.5s;
        }

        #prologue-text {
            width: 100%;
            max-width: 400px;
            text-align: center;
            font-size: 1.1rem;
            line-height: 2;
            letter-spacing: 0.1rem;
            color: var(--primary-pink);
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.5);
            margin-bottom: 50px;
            min-height: 120px; /* テキスト領域の確保 */
        }

        #loader-container {
            width: 150px;
            display: none; /* 最初は隠しておく */
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1s forwards;
        }

        #loader-bar-bg {
            width: 100%; height: 2px;
            background: rgba(255, 255, 255, 0.1);
            position: relative; overflow: hidden;
        }

        #loader-bar-fill {
            position: absolute; left: 0; top: 0;
            width: 0%; height: 100%;
            background: var(--deep-pink);
            box-shadow: 0 0 15px var(--deep-pink);
            transition: width 0.3s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Main Content Layout --- */
        #main-content {
            opacity: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            box-sizing: border-box;
            z-index: 10;
            position: relative;
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
            transform: scale(1.1);
            transition: all 1s ease-out;
        }

        #main-content.active {
            opacity: 1;
            transform: scale(1);
        }

        /* カウンター・セクションなどは前回のデザインを継承（省略・最適化） */
        #bg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .counter-box { align-self: flex-end; margin-top: 10px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 4px; font-family: monospace; font-size: 0.8rem; color: var(--flash-blue); box-shadow: 0 0 8px var(--flash-blue); border: 1px solid var(--flash-blue); }
        .content-inner { flex: 1; display: flex; flex-direction: column; justify-content: space-evenly; align-items: center; width: 100%; }
        h1.flash-text { font-size: 1.8rem; margin: 0; color: #fff; text-shadow: 0 0 15px var(--deep-pink); }
        .section { background: rgba(255, 255, 255, 0.08); padding: 15px; border-radius: 12px; backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 320px; box-sizing: border-box; }
        .kao-praise { border-left: 4px solid var(--deep-pink); }
        .daichi-insult { border-left: 4px solid #555; background: rgba(0,0,0,0.4); }
        .footer-msg { font-weight: bold; color: #fff; font-size: 0.95rem; text-shadow: 0 0 8px rgba(255, 255, 255, 0.6); text-align: center; }

        /* タップハート */
        .tap-heart { position: absolute; font-size: 2.5rem; pointer-events: none; z-index: 99; color: var(--deep-pink); text-shadow: 0 0 15px var(--deep-pink); animation: heartBurst 1s ease-out forwards; }
        @keyframes heartBurst { 0% { transform: scale(0); opacity: 0; } 20% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1) translateY(-120px); opacity: 0; } }
    </style>
</head>
<body onclick="createHeart(event)">

    <div id="opening">
        <div id="prologue-text"></div>
        <div id="loader-container">
            <div id="loader-bar-bg"><div id="loader-bar-fill"></div></div>
            <p style="font-size: 0.6rem; color: var(--deep-pink); margin-top: 10px; letter-spacing: 2px;">SYNCHRONIZING...</p>
        </div>
    </div>

    <canvas id="bg-canvas"></canvas>

    <div id="main-content">
        <div class="counter-box">DAICHI_TRACKS // MEMORY: <span id="count">0</span></div>
        <div class="content-inner">
            <h1 class="flash-text">Farewell Legacy</h1>
            <div class="section kao-praise">
                <h2 style="font-size:1.1rem; color:var(--primary-pink);">至高の美、KAO</h2>
                <p style="font-size:0.85rem;">君は朝露に濡れた大輪の薔薇だ。<br>その微笑みひとつで、この世界はバラ色に染まる。</p>
            </div>
            <div class="section daichi-insult">
                <h2 style="font-size:1.1rem; color:#888;">堕落の男、DAICHI</h2>
                <p style="font-size:0.85rem;">無様で腐りきった、泥の中の石ころ。<br>光に触れる資格など、お前にはない。</p>
            </div>
            <div class="footer-msg">
                「KAO、君の未来が輝きますように。<br>頑張れ。」
            </div>
        </div>
    </div>

    <script>
        // 100vh問題の修正
        const setVh = () => {
            document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
        };
        window.addEventListener('resize', setVh);
        setVh();

        const prologue = [
            "かつて、僕は愛していた。",
            "KAOという、最高に美しい女性を。",
            "それは、何物にも代えがたい時間だった。"
        ];

        const textElement = document.getElementById('prologue-text');
        const loaderContainer = document.getElementById('loader-container');
        const loaderBar = document.getElementById('loader-bar-fill');
        const opening = document.getElementById('opening');
        const mainContent = document.getElementById('main-content');

        // タイピングアニメーション
        async function typeText(text) {
            for (let i = 0; i <= text.length; i++) {
                textElement.innerText = text.slice(0, i);
                await new Promise(r => setTimeout(r, 70));
            }
            await new Promise(r => setTimeout(r, 1000));
        }

        async function startOpening() {
            for (let line of prologue) {
                await typeText(line);
                if (line !== prologue[prologue.length - 1]) {
                    textElement.style.opacity = 0;
                    await new Promise(r => setTimeout(r, 500));
                    textElement.style.opacity = 1;
                }
            }

            // プロローグ終了後にローディング表示
            loaderContainer.style.display = 'flex';
            let progress = 0;
            const interval = setInterval(() => {
                progress += 5;
                loaderBar.style.width = progress + '%';
                if (progress >= 100) {
                    clearInterval(interval);
                    finishOpening();
                }
            }, 50);
        }

        function finishOpening() {
            opening.style.transform = 'translateY(-100%)';
            mainContent.classList.add('active');
            initCanvas();
        }

        window.addEventListener('load', startOpening);

        // --- Canvas Background (前回の軽量版を継承) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = Array.from({length: 40}, () => ({
                x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                s: Math.random() * 2 + 1, vx: Math.random() * 0.6 - 0.3, vy: Math.random() * 0.6 - 0.3
            }));
            animate();
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255, 182, 193, 0.5)";
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        // タップカウンター
        let count = 0;
        function createHeart(e) {
            count++;
            document.getElementById('count').innerText = count;
            const h = document.createElement('div');
            h.className = 'tap-heart'; h.innerHTML = '❤️';
            h.style.left = (e.clientX - 20) + 'px'; h.style.top = (e.clientY - 20) + 'px';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 1000);
        }
    </script>
</body>
</html>
